<!DOCTYPE html>
<html lang="nl" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />

    <title>Cees Oddens – Showreel 2025</title>

  <script type="importmap">
{
  "imports": {

  <body class="bg-black text-white">

    <header id="navbar" class="fixed top-0 left-0 w-full z-50 p-4 md:px-8 md:py-4 transition-colors duration-300 ease-in-out bg-transparent">
      <nav>
        <ul class="flex flex-row gap-4 sm:gap-6 md:gap-8">
          <li><a href="index.html" class="text-white font-bold uppercase text-xs sm:text-sm tracking-wider transition-colors duration-300 hover:text-sky-400">Home</a></li>
          <li><a href="index.html#about" class="text-white font-bold uppercase text-xs sm:text-sm tracking-wider transition-colors duration-300 hover:text-sky-400">Over</a></li>
          <li><a href="index.html#projects" class="text-white font-bold uppercase text-xs sm:text-sm tracking-wider transition-colors duration-300 hover:text-sky-400">Specialisaties</a></li>
          <li><a href="index.html#contact" class="text-white font-bold uppercase text-xs sm:text-sm tracking-wider transition-colors duration-300 hover:text-sky-400">Contact</a></li>

    <main>
      <section id="hero" class="min-h-screen w-full flex flex-col items-center justify-center p-4 sm:p-6 md:p-8">
        <div class="w-full max-w-6xl aspect-video mb-8 relative rounded-lg shadow-2xl shadow-black/50">
          <iframe 
            id="vimeo-player"
            src="https://player.vimeo.com/video/1132816186?controls=1&title=0&byline=0&portrait=0" 
            class="w-full h-full border-none rounded-lg" 
            allow="fullscreen; picture-in-picture" 
            allowfullscreen 
            title="Cees Oddens – Showreel 2025">
          </iframe>
          <div id="video-overlay" class="absolute inset-0 bg-black bg-opacity-50 flex flex-col justify-center items-center cursor-pointer transition-opacity duration-500 ease-in-out rounded-lg">
            <svg class="w-20 h-20 sm:w-28 sm:h-28 text-white drop-shadow-lg transform hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
            <p class="text-white text-lg sm:text-2xl font-bold mt-4 drop-shadow-lg">Bekijk in volledig scherm</p>
          </div>
        </div>
        <p class="text-center text-base sm:text-lg md:text-xl italic text-gray-300 max-w-lg mx-auto">
          De nieuwste showreel uit 2025!
        </p>

    <footer class="bg-gray-900/50 p-8 text-center text-white">

        <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="text-base md:text-lg mx-4 transition-colors duration-300 hover:text-sky-400">

        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="text-base md:text-lg mx-4 transition-colors duration-300 hover:text-sky-400">
          Instagram

      <p class="text-gray-400 text-xs md:text-sm">
        &copy; 2025 Cees Oddens. All rights reserved. | Email: ceesoddens@hotmail.com
      </p>
    </footer>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
      // Navigation transparency on scroll
      const nav = document.getElementById('navbar');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 100) {
          nav.classList.remove('bg-transparent');
          nav.classList.add('bg-black/90');
        } else {
          nav.classList.add('bg-transparent');
          nav.classList.remove('bg-black/90');
        }
      });

      // Fullscreen video logic
      const overlay = document.getElementById('video-overlay');
      const iframe = document.getElementById('vimeo-player');
      const player = new Vimeo.Player(iframe);

      overlay.addEventListener('click', () => {
        const promise = player.play();
        
        // Request fullscreen after play is initiated
        if (promise !== undefined) {
            promise.then(() => {
                if (iframe.requestFullscreen) {
                    iframe.requestFullscreen();
                } else if (iframe.webkitRequestFullscreen) { /* Safari */
                    iframe.webkitRequestFullscreen();
                } else if (iframe.msRequestFullscreen) { /* IE11 */
                    iframe.msRequestFullscreen();
                }
            }).catch(error => {
                console.error('Error playing the video:', error);
            });
        }

        overlay.classList.add('opacity-0');
        overlay.style.pointerEvents = 'none';
      });

      const onFullScreenChange = () => {
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
        if (!isFullscreen) {
          player.pause();
          overlay.classList.remove('opacity-0');
          overlay.style.pointerEvents = 'auto';
        }
      };

      document.addEventListener('fullscreenchange', onFullScreenChange);
      document.addEventListener('webkitfullscreenchange', onFullScreenChange);
    </script>

    <!-- ARC Booking Widget Button -->
    <div id="arc-booking-widget-container"></div>
    <script>
      (function() {
        var WIDGET_URL = "http://localhost:3000/widget/IVTBpFtSaHL7jragotiu";
        var isOpen = false;
        var DESKTOP = window.innerWidth >= 768;
        var currentTab = 'reserveren';

        // ── Knoppen rechtsonder (Cadeaubon + Reserveren) ─────────────────────
        var btnWrap = document.createElement('div');
        btnWrap.style.cssText = "position:fixed;bottom:24px;right:24px;z-index:999999;display:flex;align-items:center;gap:12px;";

        var giftBtn = document.createElement('button');
        giftBtn.innerHTML = "&#127873;";
        giftBtn.title = "Cadeaubon kopen";
        giftBtn.style.cssText = "width:52px;height:52px;border-radius:50%;border:none;background:#9E8250;color:#fff;font-size:20px;box-shadow:0 4px 15px rgba(0,0,0,0.15);cursor:pointer;transition:transform 0.2s;display:flex;align-items:center;justify-content:center;font-family:sans-serif;";
        giftBtn.onmouseover = function() { giftBtn.style.transform = 'scale(1.05)'; };
        giftBtn.onmouseout  = function() { giftBtn.style.transform = 'scale(1)'; };

        var btn = document.createElement('button');
        btn.innerText = "Reserveren";
        btn.style.cssText = "padding:14px 24px;border:none;border-radius:50px;background:#9E8250;color:#fff;font-weight:600;font-size:14px;box-shadow:0 4px 15px rgba(0,0,0,0.2);cursor:pointer;transition:transform 0.2s;font-family:sans-serif;";
        btn.onmouseover = function() { btn.style.transform = 'scale(1.05)'; };
        btn.onmouseout  = function() { btn.style.transform = 'scale(1)'; };

        btnWrap.appendChild(giftBtn);
        btnWrap.appendChild(btn);

        // ── DESKTOP WIDGET (rechtsonder boven knop, klapt open) ──────────────
        var desktopWrap = document.createElement('div');
        desktopWrap.style.cssText = "position:fixed;bottom:82px;right:24px;z-index:9999999;transform:translateY(20px);opacity:0;visibility:hidden;pointer-events:none;transition:transform 0.3s cubic-bezier(0.25,0.8,0.25,1),opacity 0.25s ease,visibility 0.25s;";

        var desktopIframe = document.createElement('iframe');
        // src wordt één keer gezet en daarna nooit meer aangepast — tab-wisseling
        // gaat via postMessage zodat de iframe niet herlaadt.
        desktopIframe.src = WIDGET_URL;
        desktopIframe.style.cssText = "width:420px;min-height:400px;max-height:calc(100vh - 110px);border:none;border-radius:16px;box-shadow:0 12px 32px rgba(0,0,0,0.25);display:block;";

        desktopWrap.appendChild(desktopIframe);

        // ── MOBIEL OVERLAY ────────────────────────────────────────────────────
        var overlay = document.createElement('div');
        overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999999;display:none;justify-content:center;align-items:flex-start;overflow-y:auto;padding:20px 16px;font-family:sans-serif;box-sizing:border-box;";

        var modal = document.createElement('div');
        modal.style.cssText = "position:relative;width:100%;max-width:420px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,0.2);box-sizing:border-box;";

        var mobileClose = document.createElement('button');
        mobileClose.innerHTML = "&times;";
        mobileClose.style.cssText = "position:absolute;top:10px;right:14px;border:none;background:transparent;font-size:26px;cursor:pointer;color:#000000;z-index:10;line-height:1;";

        var mobileIframe = document.createElement('iframe');
        mobileIframe.src = WIDGET_URL;
        mobileIframe.style.cssText = "width:100%;min-height:400px;border:none;display:block;";

        // Injected styles to force fullscreen on mobile
        var style = document.createElement('style');
        style.innerHTML = "@media(max-width:767px){.arc-mobile-fullscreen-overlay{padding:0!important;background:#fff!important;}.arc-mobile-fullscreen-modal{max-width:100%!important;width:100vw!important;height:100dvh!important;border-radius:0!important;margin:0!important;box-shadow:none!important;}.arc-mobile-fullscreen-iframe{height:100dvh!important;}.arc-mobile-close-btn{display:none!important;}}";
        document.head.appendChild(style);

        overlay.className = 'arc-mobile-fullscreen-overlay';
        modal.className = 'arc-mobile-fullscreen-modal';
        mobileIframe.className = 'arc-mobile-fullscreen-iframe';
        mobileClose.className = 'arc-mobile-close-btn';

        modal.appendChild(mobileClose);
        modal.appendChild(mobileIframe);
        overlay.appendChild(modal);

        // ── Evenementen & Zalen modal ─────────────────────────────────────────
        var EVENTS_URL = WIDGET_URL + '/events';

        var eventsOverlay = document.createElement('div');
        eventsOverlay.style.cssText = "display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99999999;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto;";

        var eventsModal = document.createElement('div');
        eventsModal.style.cssText = "background:#fff;border-radius:18px;width:100%;max-width:1100px;box-shadow:0 24px 64px rgba(0,0,0,0.25);overflow:hidden;display:flex;flex-direction:column;";

        var eventsHeader = document.createElement('div');
        eventsHeader.style.cssText = "display:flex;justify-content:flex-end;padding:12px 16px;border-bottom:1px solid #f1f5f9;flex-shrink:0;";

        var eventsCloseBtn = document.createElement('button');
        eventsCloseBtn.innerHTML = "&#x2715;";
        eventsCloseBtn.style.cssText = "width:36px;height:36px;border-radius:50%;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:18px;color:#374151;display:flex;align-items:center;justify-content:center;";

        var eventsIframe = document.createElement('iframe');
        eventsIframe.style.cssText = "width:100%;height:85vh;border:none;";

        function openEventsWidget() { eventsIframe.src = EVENTS_URL; eventsOverlay.style.display = 'flex'; document.body.style.overflow = 'hidden'; close(); }
        function closeEventsWidget() { eventsOverlay.style.display = 'none'; eventsIframe.src = ''; document.body.style.overflow = ''; }

        eventsCloseBtn.onclick = closeEventsWidget;
        eventsOverlay.onclick  = function(e) { if (e.target === eventsOverlay) closeEventsWidget(); };

        eventsHeader.appendChild(eventsCloseBtn);
        eventsModal.appendChild(eventsHeader);
        eventsModal.appendChild(eventsIframe);
        eventsOverlay.appendChild(eventsModal);
        document.body.appendChild(eventsOverlay);

        // ── Dynamische hoogte via postMessage van de widget ──────────────────
        var iframeHeight = 400;
        window.addEventListener('message', function(e) {
          if (!e.data) return;
          if (e.data.type === 'arc-widget-resize') {
            if (e.source !== desktopIframe.contentWindow && e.source !== mobileIframe.contentWindow) return;
            iframeHeight = Math.max(e.data.height, 400);
            desktopIframe.style.height = iframeHeight + 'px';
            mobileIframe.style.height = iframeHeight + 'px';
          }
          if (e.data.type === 'arc-widget-colors') {
            if (e.source !== desktopIframe.contentWindow && e.source !== mobileIframe.contentWindow) return;
            if (e.data.primaryColor) giftBtn.style.background = e.data.primaryColor;
            if (e.data.headerColor) btn.style.background = e.data.headerColor;
          }
          if (e.data.type === 'arc-widget-close') {
            close();
          }
          if (e.data.type === 'arc-widget-open-events') {
            if (e.source === desktopIframe.contentWindow || e.source === mobileIframe.contentWindow) {
              openEventsWidget();
            }
          }
        });

        // ── Tab-wisseling via postMessage — voorkomt iframe herladen ──────────
        function setTab(tab) {
          if (currentTab === tab) return;
          currentTab = tab;
          var msg = { type: 'arc-widget-tab', tab: tab };
          if (desktopIframe.contentWindow) {
            desktopIframe.contentWindow.postMessage(msg, '*');
          }
          if (mobileIframe.contentWindow) {
            mobileIframe.contentWindow.postMessage(msg, '*');
          }
          // Reset hoogte bij wisselen zodat het iframe niet te groot/klein start
          iframeHeight = 400;
          desktopIframe.style.height = '400px';
          mobileIframe.style.height  = '400px';
        }

        // ── Open / sluiten ────────────────────────────────────────────────────
        function open() {
          isOpen = true;
          DESKTOP = window.innerWidth >= 768;
          if (DESKTOP) {
            desktopWrap.style.transform = 'translateY(0)';
            desktopWrap.style.opacity   = '1';
            desktopWrap.style.visibility = 'visible';
            desktopWrap.style.pointerEvents = 'auto';
          } else {
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
          }
        }
        function close() {
          isOpen = false;
          desktopWrap.style.transform = 'translateY(20px)';
          desktopWrap.style.opacity   = '0';
          desktopWrap.style.visibility = 'hidden';
          desktopWrap.style.pointerEvents = 'none';
          overlay.style.display = 'none';
          document.body.style.overflow = '';
        }

        btn.onclick          = function() { setTab('reserveren'); isOpen ? close() : open(); };
        giftBtn.onclick      = function() { if (isOpen && currentTab === 'cadeaubon') { close(); } else { setTab('cadeaubon'); open(); } };
        mobileClose.onclick  = close;
        overlay.onclick      = function(e) { if (e.target === overlay) close(); };

        document.body.appendChild(desktopWrap);
        document.body.appendChild(overlay);
        document.body.appendChild(btnWrap);

      })();
    </script>
  </body>
