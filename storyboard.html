    <style>
        :root {
            --navy: #001F3F;
            --gray-light: #f8f9fa;
            --gray-dark: #343a40;
            --white: #ffffff;
            --black: #000000;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Voorkomt blauwe highlight op mobiel */
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
            background-color: var(--black);
        }
        .font-caveat {
            font-family: 'Caveat', cursive;
        }
        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2rem;
            z-index: 1000;
            transition: background-color 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.9);
        }
        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        nav a {
            color: var(--white);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }
        nav a:hover {
            color: #ccc;
        }
        /* Hero Section */
        #hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            padding-top: 80px;
            background: var(--black);
        }
        .storyboard-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            /* Iets grotere container op mobiel */
            aspect-ratio: 16/10;
            margin-bottom: 2rem;
            border-radius: 8px;
            background-color: #080808;
            overflow: hidden; /* Zorgt dat plaatjes binnen de box blijven */
            touch-action: none; /* Voorkomt scrollen tijdens slepen */
        }
        @media (max-width: 768px) {
            .storyboard-container {
                aspect-ratio: 4/5; /* Verticaler op mobiel */
            }
        }
        .storyboard-text {
            text-align: center;
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-style: italic;
            color: var(--white);
            max-width: 800px;
            margin: 0 auto;
        }
        footer {
            background: var(--gray-dark);
            padding: 2rem;
            text-align: center;
            color: var(--white);
        }
        /* Voorkomt selecteren van afbeeldingen */
        img {
            user-select: none;
            -webkit-user-drag: none;
        }
    </style>

    <!-- React Logic -->
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const DrawingCard = ({ drawing, isSelected, onSelect }) => {
        const [translate, setTranslate] = useState({ x: 0, y: 0 });
        const [isDragging, setIsDragging] = useState(false);
        const dragStartRef = useRef({ x: 0, y: 0 });

        const handleStart = (clientX, clientY) => {
          onSelect(drawing.id);
          setIsDragging(true);
          dragStartRef.current = {
            x: clientX - translate.x,
            y: clientY - translate.y,
          };
        };

        const handleMove = (clientX, clientY) => {
          if (!isDragging) return;
          setTranslate({
            x: clientX - dragStartRef.current.x,
            y: clientY - dragStartRef.current.y,
          });
        };

        const handleEnd = () => setIsDragging(false);

        // Mouse Events
        const onMouseDown = (e) => {
            e.stopPropagation();
            handleStart(e.clientX, e.clientY);
        };

        // Touch Events voor mobiel
        const onTouchStart = (e) => {
            e.stopPropagation();
            const touch = e.touches[0];
            handleStart(touch.clientX, touch.clientY);
        };

        useEffect(() => {
          const moveListener = (e) => {
            const x = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const y = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            handleMove(x, y);
          };
          const upListener = () => handleEnd();

          if (isDragging) {
            window.addEventListener('mousemove', moveListener);
            window.addEventListener('mouseup', upListener);
            window.addEventListener('touchmove', moveListener, { passive: false });
            window.addEventListener('touchend', upListener);
          }
          return () => {
            window.removeEventListener('mousemove', moveListener);
            window.removeEventListener('mouseup', upListener);
            window.removeEventListener('touchmove', moveListener);
            window.removeEventListener('touchend', upListener);
          };
        }, [isDragging]);

        return (
          <div
            className={`absolute p-1 bg-white shadow-2xl transition-transform duration-300 ease-out select-none outline-none
              ${isSelected ? 'z-[100] cursor-grabbing' : 'cursor-grab'}`}
            style={{
              width: `${drawing.width}%`, // Gebruik percentages voor mobiel
              top: `${drawing.initialPosition.top}%`,
              left: `${drawing.initialPosition.left}%`,
              zIndex: isSelected ? 1000 : drawing.zIndex,
              transform: `translate(${translate.x}px, ${translate.y}px) rotate(${drawing.rotation}deg) scale(${isSelected ? 2.2 : 1})`,
              transformOrigin: 'center center',
              touchAction: 'none'
            }}
            onMouseDown={onMouseDown}
            onTouchStart={onTouchStart}
          >
            <img
              src={drawing.src}
              alt={drawing.alt}
              className="w-full h-auto block pointer-events-none"
              draggable="false"
            />
          </div>
        );
      };

      const App = () => {
        // Gebruik percentages voor betere responsiviteit op mobiel
        const initialDrawings = [
          // Row 1
          { id: 1, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FSB_Cruijff_Plaatje01.webp?alt=media&token=e3b06d4e-451f-48af-9edc-a383ae52568a', alt: 'Cruijff', initialPosition: { top: 5, left: -5 }, rotation: -3, zIndex: 1, width: 35 },
          { id: 2, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FSB_VanHanegem_Plaatje02.webp?alt=media&token=717aff09-bde3-43e3-8ec7-ac1270fa05f6', alt: 'Van Hanegem', initialPosition: { top: 2, left: 25 }, rotation: 2, zIndex: 2, width: 35 },
          { id: 3, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FSB_ronaldo_Plaatje02.webp?alt=media&token=24b2f9d9-2798-42a3-9415-c74bf5c99d2f', alt: 'Ronaldo', initialPosition: { top: 6, left: 55 }, rotation: -2, zIndex: 3, width: 35 },
          { id: 4, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FStoryBoardInstVid_001%20kopie.webp?alt=media&token=eb7b3572-af12-41ee-ba0f-3ed04502bdbd', alt: 'Action', initialPosition: { top: 0, left: 80 }, rotation: 4, zIndex: 4, width: 30 },

          // Row 2
          { id: 5, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FStoryBoardInstVid_002%20kopie.webp?alt=media&token=5bcba1fd-67ac-4290-8406-fc26e0d2e91c', alt: 'Vehicle', initialPosition: { top: 35, left: 0 }, rotation: 3, zIndex: 5, width: 35 },
          { id: 6, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FSB_Cruijff_Plaatje01.webp?alt=media&token=e3b06d4e-451f-48af-9edc-a383ae52568a', alt: 'Cruijff', initialPosition: { top: 30, left: 30 }, rotation: -4, zIndex: 6, width: 35 },
          { id: 7, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FSB_VanHanegem_Plaatje02.webp?alt=media&token=717aff09-bde3-43e3-8ec7-ac1270fa05f6', alt: 'Van Hanegem', initialPosition: { top: 38, left: 60 }, rotation: 1, zIndex: 7, width: 35 },
          { id: 8, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FSB_ronaldo_Plaatje02.webp?alt=media&token=24b2f9d9-2798-42a3-9415-c74bf5c99d2f', alt: 'Ronaldo', initialPosition: { top: 32, left: 85 }, rotation: -2, zIndex: 8, width: 30 },

          // Row 3
          { id: 9, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FSB_Cruijff_Plaatje01.webp?alt=media&token=e3b06d4e-451f-48af-9edc-a383ae52568a', alt: 'Cruijff', initialPosition: { top: 65, left: 5 }, rotation: -5, zIndex: 9, width: 35 },
          { id: 10, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FSB_VanHanegem_Plaatje02.webp?alt=media&token=717aff09-bde3-43e3-8ec7-ac1270fa05f6', alt: 'Van Hanegem', initialPosition: { top: 60, left: 35 }, rotation: 3, zIndex: 10, width: 35 },
          { id: 11, src: 'https://firebasestorage.googleapis.com/v0/b/eigenwebsite-20b2e.firebasestorage.app/o/StoryBoard%2FSB_ronaldo_Plaatje02.webp?alt=media&token=24b2f9d9-2798-42a3-9415-c74bf5c99d2f', alt: 'Ronaldo', initialPosition: { top: 68, left: 65 }, rotation: -3, zIndex: 11, width: 35 },
        ];

        const [drawings, setDrawings] = useState(initialDrawings);
        const [selectedId, setSelectedId] = useState(null);

        const handleSelectDrawing = (id) => {
          setSelectedId(id);
          setDrawings(prevDrawings => {
            const maxZ = Math.max(...prevDrawings.map(d => d.zIndex));
            return prevDrawings.map(d => {
              if (d.id === id) {
                return { ...d, zIndex: maxZ + 1 };
              }
              return d;
            });
          });
        };

        const handleDeselect = () => setSelectedId(null);

        return (
          <main className="relative w-full h-full" onClick={handleDeselect}>
            {drawings.map(drawing => (
              <DrawingCard
                key={drawing.id}
                drawing={drawing}
                isSelected={selectedId === drawing.id}
                onSelect={handleSelectDrawing}
              />
            ))}
          </main>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>

    <!-- ARC Booking Widget Button -->
    <div id="arc-booking-widget-container"></div>
    <script>
      (function() {
        var WIDGET_URL = "https://arc-booking.vercel.app/widget/IVTBpFtSaHL7jragotiu";
        var isOpen = false;
        var isExpanded = false;
        var DESKTOP = window.innerWidth >= 768;

        window.addEventListener('resize', function() {
          DESKTOP = window.innerWidth >= 768;
        });

        // ── Inject responsive styles ──────────────────────────────────────────
        var style = document.createElement('style');
        style.innerHTML = 
          ".arc-widget-backdrop {" +
          "  position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999998;opacity:0;pointer-events:none;backdrop-filter:blur(4px);transition:opacity 0.28s ease;" +
          "}" +
          ".arc-widget-backdrop.visible {" +
          "  opacity:1;pointer-events:auto;" +
          "}" +
          ".arc-widget-wrap {" +
          "  position:fixed;z-index:9999999;border-radius:16px;box-shadow:0 12px 32px rgba(0,0,0,0.25);background:#ffffff;overflow:hidden;box-sizing:border-box;" +
          "  opacity:0;pointer-events:none;" +
          "}" +
          ".arc-widget-iframe {" +
          "  width:100%;height:100%;border:none;display:block;background:transparent;" +
          "}" +
          "@media (min-width: 768px) {" +
          "  .arc-widget-wrap {" +
          "    bottom:90px;right:24px;" +
          "    width:420px;height:400px;" +
          "    transform-origin:bottom right;transform:translateY(16px);" +
          "    transition:transform 0.28s cubic-bezier(0.22,1,0.36,1),opacity 0.2s ease,width 0.26s cubic-bezier(0.4,0,0.2,1),height 0.42s cubic-bezier(0.4,0,0.2,1);" +
          "  }" +
          "  .arc-widget-wrap.open {" +
          "    opacity:1;transform:translateY(0);pointer-events:auto;" +
          "  }" +
          "  .arc-widget-wrap.expanded {" +
          "    width:960px;max-width:95vw;height:860px;max-height:90vh;" +
          "  }" +
          "}" +
          "@media (max-width: 767px) {" +
          "  .arc-widget-wrap {" +
          "    bottom:90px;right:16px;" +
          "    width:calc(100vw - 32px);max-width:400px;height:400px;" +
          "    transform-origin:bottom right;transform:translateY(16px) scale(0);" +
          "    transition:transform 0.38s cubic-bezier(0.34,1.4,0.64,1),opacity 0.25s ease,width 0.26s cubic-bezier(0.4,0,0.2,1),height 0.42s cubic-bezier(0.4,0,0.2,1);" +
          "    max-height:calc(100vh - 120px);max-height:calc(100dvh - 120px);" +
          "  }" +
          "  .arc-widget-wrap.open {" +
          "    opacity:1;transform:translateY(0) scale(1);pointer-events:auto;" +
          "  }" +
          "}";
        document.head.appendChild(style);

        // ── Knoppen rechtsonder (Cadeaubon + Reserveren) ─────────────────────
        var btnWrap = document.createElement('div');
        btnWrap.style.cssText = "position:fixed;bottom:24px;right:24px;z-index:999999;display:flex;align-items:center;gap:12px;";

        var giftBtn = document.createElement('button');
        giftBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>';
        giftBtn.title = "Cadeaubon kopen";
        giftBtn.style.cssText = "width:52px;height:52px;border-radius:50%;border:none;background:transparent;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.15);cursor:pointer;transition:transform 0.2s,opacity 0.3s ease;display:flex;align-items:center;justify-content:center;font-family:sans-serif;opacity:0;";
        giftBtn.onmouseover = function() { giftBtn.style.transform = 'scale(1.05)'; };
        giftBtn.onmouseout  = function() { giftBtn.style.transform = 'scale(1)'; };

        var btn = document.createElement('button');
        btn.innerText = "Reserveren";
        btn.style.cssText = "padding:0 24px;height:52px;display:flex;align-items:center;justify-content:center;border:none;border-radius:50px;background:transparent;color:#ffffff;font-weight:600;font-size:14px;box-shadow:0 4px 15px rgba(0,0,0,0.2);cursor:pointer;transition:transform 0.2s,opacity 0.3s ease;font-family:sans-serif;opacity:0;";
        btn.onmouseover = function() { btn.style.transform = 'scale(1.05)'; };
        btn.onmouseout  = function() { btn.style.transform = 'scale(1)'; };

        btnWrap.appendChild(giftBtn);
        btnWrap.appendChild(btn);

        // ── Viewport-hoogte helper ────────────────────────────────────────────
        function getViewportHeight() { return window.visualViewport ? window.visualViewport.height : window.innerHeight; }

        // ── BACKDROP OVERLAY ──────────────────────────────────────────────────
        var backdrop = document.createElement('div');
        backdrop.className = 'arc-widget-backdrop';

        // ── WIDGET WRAPPER ────────────────────────────────────────────────────
        var wrap = document.createElement('div');
        wrap.className = 'arc-widget-wrap';

        var iframe = document.createElement('iframe');
        iframe.src = WIDGET_URL;
        iframe.className = 'arc-widget-iframe';
        wrap.appendChild(iframe);

        // ── Evenementen & Zalen modal ─────────────────────────────────────────
        var EVENTS_URL = WIDGET_URL + '/events';
        var eventsOverlay = document.createElement('div');
        eventsOverlay.style.cssText = "display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99999999;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto;";

        var eventsModal = document.createElement('div');
        eventsModal.style.cssText = "background:#fff;border-radius:18px;width:100%;max-width:1100px;box-shadow:0 24px 64px rgba(0,0,0,0.25);overflow:hidden;display:flex;flex-direction:column;";

        var eventsHeader = document.createElement('div');
        eventsHeader.style.cssText = "display:flex;justify-content:flex-end;padding:12px 16px;border-bottom:1px solid #f1f5f9;flex-shrink:0;";

        var eventsCloseBtn = document.createElement('button');
        eventsCloseBtn.innerHTML = "&#x2715;";
        eventsCloseBtn.style.cssText = "width:36px;height:36px;border-radius:50%;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:18px;color:#374151;display:flex;align-items:center;justify-content:center;";

        var eventsIframe = document.createElement('iframe');
        eventsIframe.style.cssText = "width:100%;height:400px;border:none;";

        function openEventsWidget() {
          eventsIframe.style.transition = '';
          eventsIframe.src = EVENTS_URL;
          eventsIframe.style.height = (getViewportHeight() - 40) + 'px';
          setTimeout(function() { eventsIframe.style.transition = 'height 0.3s ease'; }, 50);
          eventsOverlay.style.display = 'flex';
          document.body.style.overflow = 'hidden';
          close();
        }
        function closeEventsWidget() { eventsOverlay.style.display = 'none'; eventsIframe.src = ''; document.body.style.overflow = ''; }

        eventsCloseBtn.onclick = closeEventsWidget;
        eventsOverlay.onclick  = function(e) { if (e.target === eventsOverlay) closeEventsWidget(); };

        eventsHeader.appendChild(eventsCloseBtn);
        eventsModal.appendChild(eventsHeader);
        eventsModal.appendChild(eventsIframe);
        eventsOverlay.appendChild(eventsModal);
        document.body.appendChild(eventsOverlay);

        // ── WIDGET SCHAAL FUNCTIES ───────────────────────────────────────────
        function expandWidget() {
          if (isExpanded) return;
          isExpanded = true;
          wrap.classList.add('expanded');
          backdrop.classList.add('visible');
          if (DESKTOP) {
            wrap.style.width = '';
            wrap.style.height = '';
          }
        }

        // Terug naar standaard selectie-scherm grootte
        function shrinkWidget() {
          if (!isExpanded) return;
          isExpanded = false;
          wrap.classList.remove('expanded');
          if (DESKTOP) {
            backdrop.classList.remove('visible');
            wrap.style.width = '420px';
            wrap.style.height = iframeHeight + 'px';
          }
        }

        // ── Dynamische hoogte via postMessage ───────────────────────────────
        var iframeHeight = 400;
        var firstMsgReceived = false;
        var rafId = null;
        var rafTargetHeight = null;
        var isWidgetAnimating = false;

        function startHeightTracking(durationMs) {
          if (rafId !== null) cancelAnimationFrame(rafId);
          var start = performance.now();
          function tick(now) {
            if (rafTargetHeight !== null && (!isExpanded || !DESKTOP)) {
              wrap.style.height = rafTargetHeight + 'px';
            }
            if (now - start < durationMs) {
              rafId = requestAnimationFrame(tick);
            } else {
              rafId = null;
            }
          }
          rafId = requestAnimationFrame(tick);
        }

        window.addEventListener('message', function(e) {
          if (!e.data) return;
          if (e.data.type === 'arc-widget-resize') {
            if (e.source !== iframe.contentWindow) return;
            var limit = DESKTOP ? 110 : 40;
            iframeHeight = Math.min(Math.max(e.data.height, 400), getViewportHeight() - limit);
            rafTargetHeight = iframeHeight;
            if (!isWidgetAnimating && (!isExpanded || !DESKTOP)) {
              wrap.style.height = iframeHeight + 'px';
            }
            if (!firstMsgReceived) {
              firstMsgReceived = true;
              setTimeout(function() {
                iframe.style.transition = '';
              }, 50);
            }
          }
          if (e.data.type === 'arc-widget-colors') {
            if (e.source !== iframe.contentWindow) return;
            var pc = e.data.primaryColor;
            var hc = e.data.headerColor;
            if (pc) giftBtn.style.background = pc;
            if (hc) btn.style.background = hc;
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                if (pc) giftBtn.style.opacity = '1';
                if (hc) btn.style.opacity = '1';
              });
            });
          }
          if (e.data.type === 'arc-widget-animation-start') {
            if (e.source !== iframe.contentWindow) return;
            isWidgetAnimating = true;
            startHeightTracking(e.data.duration || 260);
            setTimeout(function() { isWidgetAnimating = false; }, e.data.duration || 260);
          }
          if (e.data.type === 'arc-widget-view') {
            if (e.source !== iframe.contentWindow) return;
            var v = e.data.view;
            if (v === 'contact' || v === 'payment' || v === 'confirmation') {
              expandWidget();
            } else if (v === 'selection') {
              shrinkWidget();
            }
          }
          if (e.data.type === 'arc-widget-close') {
            if (e.source !== iframe.contentWindow) return;
            close();
          }
          if (e.source === iframe.contentWindow) {
            if (e.data.type === 'arc-widget-open-events') {
              openEventsWidget();
            }
          }
        });

        // ── Open / sluiten ────────────────────────────────────────────────────
        function open() {
          isOpen = true;
          wrap.classList.add('open');
          if (!DESKTOP) {
            backdrop.classList.add('visible');
            document.body.style.overflow = 'hidden';
          }
          try {
            if (iframe && iframe.contentWindow) {
              iframe.contentWindow.postMessage({ type: 'arc-widget-open-event' }, '*');
            }
          } catch (err) {}
        }

        function close() {
          isOpen = false;
          wrap.classList.remove('open');
          backdrop.classList.remove('visible');
          document.body.style.overflow = '';
          
          if (isExpanded) {
            isExpanded = false;
            wrap.classList.remove('expanded');
            if (DESKTOP) {
              wrap.style.width = '420px';
              wrap.style.height = iframeHeight + 'px';
            }
          }
        }

        // ── Tab-wisseling via postMessage ─────────────────────────────────────
        var currentTab = 'reserveren';
        function setTab(tab) {
          currentTab = tab;
          var msg = { type: 'arc-widget-tab', tab: tab };
          if (iframe.contentWindow) {
            iframe.contentWindow.postMessage(msg, '*');
          }
          iframe.style.transition = '';
          setTimeout(function() {
            iframe.style.transition = 'height 0.3s ease';
          }, 50);
          if (tab === 'reserveren') {
            iframe.style.height = '400px';
          }
        }

        btn.onclick          = function() { setTab('reserveren'); isOpen ? close() : open(); };
        giftBtn.onclick      = function() { if (isOpen && currentTab === 'cadeaubon') { close(); } else { setTab('cadeaubon'); open(); } };
        backdrop.onclick = close;

        document.body.appendChild(wrap);
        document.body.appendChild(backdrop);
        document.body.appendChild(btnWrap);

      })();
    </script>
</body>
</html>
